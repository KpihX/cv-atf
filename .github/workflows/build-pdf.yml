name: Build PDF

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX (XeLaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Resume.tex
          compiler: xelatex
          args: -interaction=nonstopmode -halt-on-error

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Resume-PDF
          path: Resume.pdf
          retention-days: 90

      - name: Generate PNG preview
        run: |
          sudo apt-get install -y imagemagick ghostscript
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' \
            /etc/ImageMagick-6/policy.xml || true
          convert -density 150 Resume.pdf[0] -quality 90 -background white -alpha remove preview.png
          echo "Preview generated:"
          ls -lh preview.png

      - name: Commit preview to repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add preview.png
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "ci: update CV preview [skip ci]" && git push

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Resume.pdf
          body: |
            ## CV — ${{ github.ref_name }}
            Download the compiled PDF below.
