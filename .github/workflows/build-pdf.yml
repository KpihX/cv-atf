name: Build PDF

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX (pdflatex — double pass, artifacts in build/)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: CV_KAMDEM_Ivann.tex
          compiler: pdflatex
          args: -interaction=nonstopmode -halt-on-error -output-directory=build
          extra_system_packages: "lmodern"
          pre_compile: "mkdir -p build"
          post_compile: "cp build/CV_KAMDEM_Ivann.pdf CV_KAMDEM_Ivann.pdf"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: CV_KAMDEM_Ivann
          path: CV_KAMDEM_Ivann.pdf
          retention-days: 90

      - name: Generate PNG preview
        run: |
          sudo apt-get install -y imagemagick ghostscript
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' \
            /etc/ImageMagick-6/policy.xml || true
          convert -density 150 CV_KAMDEM_Ivann.pdf -quality 90 -background white -alpha remove preview.png

      - name: Commit preview to repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add preview.png
          git diff --staged --quiet && echo "No changes." || \
            (git commit -m "ci: update CV preview [skip ci]" && git push)

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CV_KAMDEM_Ivann.pdf
          body: |
            ## CV — ${{ github.ref_name }}
            Download the compiled PDF below.
