image: texlive/texlive:latest

stages:
  - build
  - preview

variables:
  SOURCE: CV_KAMDEM_Ivann

build-pdf:
  stage: build
  script:
    - mkdir -p build
    - pdflatex -interaction=nonstopmode -halt-on-error -output-directory=build $SOURCE.tex
    - pdflatex -interaction=nonstopmode -output-directory=build $SOURCE.tex
    - cp build/$SOURCE.pdf $SOURCE.pdf
    - ls -lh $SOURCE.pdf
  artifacts:
    name: "CV_KAMDEM_Ivann-${CI_COMMIT_SHORT_SHA}"
    expose_as: "CV PDF"
    paths:
      - CV_KAMDEM_Ivann.pdf
    expire_in: 1 year
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

generate-preview:
  stage: preview
  dependencies:
    - build-pdf
  script:
    - apt-get update -qq && apt-get install -y -qq imagemagick ghostscript
    - sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true
    - convert -density 150 CV_KAMDEM_Ivann.pdf -quality 90 -background white -alpha remove preview.png
    - ls -lh preview.png
  artifacts:
    name: "CV_KAMDEM_Ivann-preview-${CI_COMMIT_SHORT_SHA}"
    expose_as: "CV Preview PNG"
    paths:
      - preview.png
    expire_in: 1 year
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
